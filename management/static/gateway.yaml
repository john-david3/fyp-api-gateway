#
# Configuration file for API Gateway
#

connections:
  - host: localhost
    port: 8080
    routes:
      - path: /products
        upstream:
          name: product_service
          port: 9001
        rate-limit:
          zone: 10
          rate: 5
        auth: false

      - path: /orders
        upstream:
          name: order_service
          port: 9002
        rate-limit:
          zone: 10
          rate: 5
        auth: false

      - path: /protected
        upstream:
          name: protected_service
          port: 9003
        rate-limit:
          zone: 10
          rate: 5
        auth: true