name: CI

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - "docs/"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  unit-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.1.0
      - name: Run Unit Tests
        run: make unit-tests

  test-dataplane:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.1.0
      - name: Test NGINX with microservices
        run: |
          make docker-build && make docker-run
